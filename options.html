<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Word Alert — Options</title>
  <style>
    body { font-family: sans-serif; padding: 30px; max-width: 600px; }
    h1 { font-size: 20px; }
    .word-row {
      display: flex; gap: 10px; align-items: center; margin-bottom: 10px;
    }
    .word-row input {
      padding: 6px 10px; border-radius: 5px;
      border: 1px solid #ccc; font-size: 13px;
    }
    .word-row input:first-child { width: 150px; }
    .word-row input:last-child { flex: 1; }
    .word-row button {
      background: #dc3545; color: white; border: none;
      padding: 6px 10px; border-radius: 5px; cursor: pointer;
    }
    #add-row {
      background: #0d6efd; color: white; border: none;
      padding: 8px 16px; border-radius: 5px; cursor: pointer;
      font-size: 13px; margin-right: 10px;
    }
    #save {
      background: #198754; color: white; border: none;
      padding: 8px 16px; border-radius: 5px; cursor: pointer; font-size: 13px;
    }
    #status { color: green; margin-top: 10px; font-size: 13px; }
    label { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h1>⚙️ Mots à surveiller</h1>
  <label>Mot surveillé &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Suggestions (séparées par des virgules)</label>
  <div id="rows"></div>
  <br>
  <button id="add-row">+ Ajouter un mot</button>
  <button id="save">Enregistrer</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
